spring.application.name=misfinanzas

spring.datasource.url=jdbc:mysql://localhost:3306/bd_misfinanzas
spring.datasource.username=root
spring.datasource.password=admin

server.servlet.context-path=/api/v1.0

#jpa Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Email Cofiguration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_EMAIL}
