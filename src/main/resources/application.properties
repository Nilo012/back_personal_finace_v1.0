spring.application.name=misfinanzas

spring.datasource.url=jdbc:mysql://localhost:3306/bd_misfinanzas
spring.datasource.username=root
spring.datasource.password=admin

server.servlet.context-path=/api/v1.0

#jpa Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Email Cofiguration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_EMAIL}

# Clave secreta (debe ser base64 y de al menos 32 bytes)
app.jwt.secret=${JWT_SECRET}
# Tiempo de expiración en milisegundos (10 horas)
app.jwt.expiration=36000000

#
money.manager.frontend.url=${MIS_FINANZAS_FRONTEND_URL}


app.activation.url=${MIS_FINANZAS_BACKEND_URL}

spring.profiles.active=prod
